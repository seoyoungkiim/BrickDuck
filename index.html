<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrickDuck</title>
  <style>
    :root {
      --fg: #111;
      --muted: #888;
      --line: #e5e5e5;
      --bg: #fff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    body {
      display: flex;
      flex-direction: column;
    }

    /* 상단 헤더 */
    header {
      padding: 20px 32px 8px;
    }

    .logo {
      font-size: 14px;
      letter-spacing: 0.01em;
    }

    .tagline {
      padding: 0 32px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    /* 풀스크린 이미지 영역 */
    .hero {
      flex: 1;
      position: relative;
      background: #f4f4f4;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b5b5b5;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    /* 이미지 위 신청하기 버튼 */
    .cta {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: inline-block;
      padding: 14px 28px;
      background: var(--fg);
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.02em;
      border: 1px solid var(--fg);
      transition: background 0.15s, color 0.15s;
    }

    .cta:hover {
      background: #fff;
      color: var(--fg);
    }

    @media (max-width: 640px) {
      header { padding: 16px 20px 6px; }
      .tagline { padding: 0 20px 16px; }
      .cta { padding: 12px 24px; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">BrickDuck</a>
  </header>

  <p class="tagline">김서영의 벽돌과 이희찬의 오리가 그려진 리소 2도 인쇄 진입니다. 
기본형인 a6 버전(8p)과 벽돌 버전(4p, 105*297mm), 오리 버전(4p, 210*148mm) 버전 중 하나를 골라 배송받으실 수 있습니다.
.</p>

  <div class="hero">
    <!-- 이미지를 넣으려면 아래 주석을 풀고 src 경로를 본인 이미지 파일명으로 바꾸세요 -->
    <img src="hero.jpg" alt="BrickDuck" />
    <span class="hero-placeholder">IMAGE</span>

    <a href="apply.html" class="cta">신청하기 →</a>
  </div>
</body>
</html>
