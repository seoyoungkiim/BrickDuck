<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrickDuck — 신청 완료</title>
  <style>
    :root {
      --fg: #111;
      --muted: #888;
      --line: #e5e5e5;
      --bg: #fff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { opacity: 0.55; }

    header {
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--line);
    }

    .logo { font-size: 14px; }

    nav ul {
      list-style: none;
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    main {
      padding: 80px 32px;
      max-width: 560px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.005em;
      margin-bottom: 16px;
    }

    .desc {
      color: var(--muted);
      margin-bottom: 48px;
      max-width: 440px;
    }

    .links {
      display: flex;
      gap: 24px;
      font-size: 13px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .links a {
      color: var(--fg);
    }

    footer {
      margin-top: 80px;
      padding: 24px 32px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 640px) {
      header { padding: 16px 20px; }
      nav ul { gap: 16px; font-size: 12px; }
      main { padding: 60px 20px; }
      h1 { font-size: 22px; }
      footer { padding: 20px; flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">BrickDuck</a>
    <nav>
      <ul>
        <li><a href="index.html">소개</a></li>
        <li><a href="apply.html">신청하기</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <p class="label">접수 완료</p>
    <h1>신청이 완료되었어요.</h1>
    <p class="desc">입력해주신 정보로 신청이 정상적으로 접수되었습니다. 감사합니다.</p>

    <div class="links">
      <a href="index.html">← 처음으로</a>
      <a href="apply.html">다시 신청하기</a>
    </div>
  </main>

  <footer>
    <span>BrickDuck</span>
    <span>© 2026</span>
  </footer>
</body>
</html>
